name: Release

# Cut a release by pushing a version tag, e.g.:
#   npm version 1.0.1 --no-git-tag-version   # bump package.json
#   git commit -am "release: v1.0.1" && git tag v1.0.1 && git push --follow-tags
#
# Each OS builds its own installers and uploads them — plus the auto-update
# manifests (latest*.yml) — to a GitHub Release for the tag. electron-builder
# creates the release as a DRAFT; review the assets, then click "Publish release"
# to make the update visible to installed apps.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and publish
        env:
          # Default token; has contents:write for this repo via the job permission.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # macOS code signing + notarization. All optional — when these repo
          # secrets are unset they pass through empty and the build stays unsigned
          # (electron-builder.cjs gates notarization on their presence). Windows
          # and Linux ignore them.
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}                       # base64 of the Developer ID Application .p12
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}       # the .p12 export password
          APPLE_ID: ${{ secrets.APPLE_ID }}                          # Apple ID email
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}                # 10-char Team ID
          # Only let electron-builder attempt signing when a cert is actually supplied.
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ secrets.MAC_CSC_LINK != '' }}
        run: npm run release
